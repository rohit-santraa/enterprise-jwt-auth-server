services:
  mysql:
    image: mysql:8.0
    container_name: authserver-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: authserver
      MYSQL_USER: authuser
      MYSQL_PASSWORD: authpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "authuser", "-pauthpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: authserver-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/authserver?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: authuser
      DB_PASSWORD: authpass
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000

volumes:
  mysql_data:
